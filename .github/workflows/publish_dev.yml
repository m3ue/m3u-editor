name: Dev
on:
  push:
    branches: [dev]
    paths:
      - 'config/dev.php'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/m3u-editor

jobs:
  # Run CI checks first
  ci-check:
    name: CI Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Extract version from config/dev.php
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      proxy_commit: ${{ steps.proxy.outputs.commit }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract dev version from config
        id: version
        run: |
          VERSION=$(grep -oP "'dev_version'\s*=>\s*'\K[^']+" config/dev.php | sed 's/-dev$//')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract dev_version from config/dev.php"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Dev version: $VERSION"

          if git ls-remote --tags origin "refs/tags/v${VERSION}-dev" | grep -q .; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag v${VERSION}-dev already exists — Docker build will be skipped"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get m3u-proxy latest commit
        id: proxy
        run: |
          PROXY_COMMIT=$(git ls-remote https://github.com/${{ github.repository_owner }}/m3u-proxy.git refs/heads/dev | cut -f1)
          if [ -z "$PROXY_COMMIT" ]; then
            echo "::warning::Could not fetch m3u-proxy commit, using timestamp for cache bust"
            PROXY_COMMIT=$(date +%s)
          fi
          echo "commit=$PROXY_COMMIT" >> $GITHUB_OUTPUT
          echo "📦 m3u-proxy commit: $PROXY_COMMIT"

  push-amd64:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    needs: [ci-check, get-version]
    if: needs.get-version.outputs.tag_exists != 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:dev-amd64
            ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}-amd64
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            M3U_PROXY_REPO=https://github.com/${{ github.repository_owner }}/m3u-proxy.git
            M3U_PROXY_BRANCH=dev
            M3U_PROXY_COMMIT=${{ needs.get-version.outputs.proxy_commit }}
          cache-from: type=gha,scope=dev-amd64
          cache-to: type=gha,mode=max,scope=dev-amd64
          provenance: false
          sbom: false

  push-arm64:
    name: Build & Push (arm64)
    runs-on: ubuntu-22.04-arm
    needs: [ci-check, get-version]
    if: needs.get-version.outputs.tag_exists != 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:dev-arm64
            ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}-arm64
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            GIT_TAG=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            M3U_PROXY_REPO=https://github.com/${{ github.repository_owner }}/m3u-proxy.git
            M3U_PROXY_BRANCH=dev
            M3U_PROXY_COMMIT=${{ needs.get-version.outputs.proxy_commit }}
          cache-from: type=gha,scope=dev-arm64
          cache-to: type=gha,mode=max,scope=dev-arm64
          provenance: false
          sbom: false

  push-manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [get-version, push-amd64, push-arm64]
    if: needs.get-version.outputs.tag_exists != 'true'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push dev manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:dev \
            ${{ env.REGISTRY_IMAGE }}:dev-amd64 \
            ${{ env.REGISTRY_IMAGE }}:dev-arm64

      - name: Create and push versioned manifest
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }} \
            ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}-amd64 \
            ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}-arm64

      - name: Inspect manifests
        run: |
          echo "📦 Dev (latest) manifest:"
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:dev
          echo ""
          echo "📦 Versioned manifest (dev-${{ needs.get-version.outputs.version }}):"
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}

      - name: Summary
        run: |
          echo "## 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY_IMAGE }}:dev\` | Latest dev build |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}\` | Pinned version |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  create-release:
    name: Create Dev Pre-release
    runs-on: ubuntu-latest
    needs: [get-version, push-manifest]
    if: always() && needs.get-version.result == 'success' && needs.get-version.outputs.tag_exists != 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get previous dev release commit
        id: prev_tag
        run: |
          LATEST_TAG=$(git tag -l "v*-dev" --sort=-creatordate | head -n 1)
          if [ -n "$LATEST_TAG" ]; then
            PREV_COMMIT=$(git rev-list -n 1 "$LATEST_TAG")
          else
            PREV_COMMIT=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "prev_commit=$PREV_COMMIT" >> $GITHUB_OUTPUT
          echo "Previous commit: $PREV_COMMIT (from tag: ${LATEST_TAG:-none})"

      - name: Generate changelog
        run: |
          PREV="${{ steps.prev_tag.outputs.prev_commit }}"

          git log "${PREV}..HEAD" --no-merges --pretty=format:"%s|%h" > commits.txt

          declare -A seen_msgs
          while IFS='|' read -r msg hash; do
            [[ "$msg" =~ ^[Vv]ersion\ bump ]] && continue
            # Normalize: strip leading emoji + space, lowercase for dedup key
            norm=$(echo "$msg" | sed 's/^[^[:alnum:]]*//' | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//')
            [[ -n "${seen_msgs[$norm]}" ]] && continue
            seen_msgs[$norm]=1
            if [[ "$msg" =~ ^feat ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> features.tmp
            elif [[ "$msg" =~ ^fix ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> fixes.tmp
            elif [[ "$msg" =~ ^perf ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> perf.tmp
            elif [[ "$msg" =~ ^refactor ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> refactor.tmp
            elif [[ "$msg" =~ ^docs ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> docs.tmp
            elif [[ "$msg" =~ ^chore ]]; then
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> chores.tmp
            else
              printf -- '- %s (`%s`)\n' "$msg" "$hash" >> other.tmp
            fi
          done < commits.txt

          {
            echo "## What's Changed"
            echo ""
            if [ -f features.tmp ]; then
              echo "### Features"
              cat features.tmp
              echo ""
            fi
            if [ -f fixes.tmp ]; then
              echo "### Bug Fixes"
              cat fixes.tmp
              echo ""
            fi
            if [ -f perf.tmp ]; then
              echo "### Performance"
              cat perf.tmp
              echo ""
            fi
            if [ -f refactor.tmp ]; then
              echo "### Refactoring"
              cat refactor.tmp
              echo ""
            fi
            if [ -f docs.tmp ]; then
              echo "### Documentation"
              cat docs.tmp
              echo ""
            fi
            if [ -f chores.tmp ]; then
              echo "### Maintenance"
              cat chores.tmp
              echo ""
            fi
            if [ -f other.tmp ]; then
              echo "### Other Changes"
              cat other.tmp
              echo ""
            fi
            echo "---"
            echo "### Docker Image"
            echo '```'
            echo "docker pull ${{ env.REGISTRY_IMAGE }}:dev-${{ needs.get-version.outputs.version }}"
            echo '```'
          } > changelog.md

          rm -f *.tmp commits.txt

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}-dev
          name: "Dev ${{ needs.get-version.outputs.version }}"
          body_path: changelog.md
          prerelease: true
          generate_release_notes: false
          make_latest: false

      - name: Advance release tag to current commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -f v${{ needs.get-version.outputs.version }}-dev ${{ github.sha }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            "refs/tags/v${{ needs.get-version.outputs.version }}-dev" --force

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [push-amd64, push-arm64, push-manifest, create-release]
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "::error::Dev deployment failed! Check the workflow logs."
          echo "Failed job: ${{ github.workflow }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
