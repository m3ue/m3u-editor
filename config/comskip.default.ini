; Default Comskip configuration for m3u-editor DVR recordings.
; This is bundled with the application and can be overridden per-DvrSetting
; via the comskip_ini_path field.
;
; Comskip documentation: http://www.kaashoek.com/comskip/

; ── Output ──
output_edl=1                      ; Generate .edl (Edit Decision List) — required
output_vdr=0                      ; No VDR format
output_edlx=0                     ; No extended EDL
output_plist_cut=0                ; No Apple plist
output_timing=0                   ; No timing debug
live_tv=0                         ; Headless mode — no GUI
verbose=0                         ; Minimal logging
standoff=0                        ; Show closed captions (0=off, 1=on)
output_debugwindow=0              ; No debug window
output_bt=0                       ; No BT log

; ── Detection ──
detect_method=255                 ; Use all detection methods (sum of: 1=black, 2=logo, 4=scene, 8=fuzzy, 16=cc, 32=aspect, 64=silence, 128=repetitive)
max_brightness=60                 ; Threshold for black frame detection
test_brightness=40                ; Minimum brightness decrease for black frame
max_avg_brightness=25             ; Maximum average brightness for black frame
max_commercial_break=600          ; Maximum commercial break length (seconds)
min_commercial_break=30           ; Minimum commercial break length (seconds)
max_commercial_size=180           ; Maximum single commercial length (seconds)
min_commercial_size=5             ; Minimum single commercial length (seconds)
min_show_segment_length=120       ; Minimum show segment between commercials (seconds)

; ── Pre/Post padding ──
padding=0                         ; No padding added to commercials
remove_before=0                   ; Seconds to remove before a commercial
remove_after=0                    ; Seconds to remove after a commercial

; ── Validation ──
validate_silence=1                ; Use silence detection for validation
validate_uniform=1                ; Use uniform frame detection
validate_scenechange=1            ; Use scene change validation
global_threshold=1.05             ; Global threshold ratio

; ── Performance ──
max_volume=500                    ; Maximum volume for silence detection
min_volume=200                    ; Minimum volume for silence detection
non_uniformity=500                ; Non-uniformity threshold
play_nice=1                       ; Nice priority (CPU)
