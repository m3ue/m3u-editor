user ${NGINX_USER};
worker_processes auto;

# number of file descriptors used for nginx
# the limit for the maximum FDs on the server is usually set by the OS.
# if you don't set FD's then OS settings will be used which is by default 2000
worker_rlimit_nofile 50000;

pid /var/run/nginx.pid;

events {
    worker_connections  2048;  # Tweak as needed for concurrency
}

http {
    # Load MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    # Logs
    # access_log  /var/log/nginx/access.log  main;
    access_log  off;
    error_log   /var/log/nginx/error.log crit;

    # Other typical directives
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    keepalive_timeout    300;
    client_max_body_size 1024M;
    fastcgi_read_timeout 300;

    # Gzip compression - critical for Livewire/Filament HTML responses
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_min_length  256;
    gzip_types       text/plain text/css text/xml text/javascript
                     application/json application/javascript application/xml
                     application/xml+rss application/rss+xml
                     application/vnd.ms-fontobject font/truetype font/opentype
                     image/svg+xml;

    # Load any additional server blocks
    # Each .conf in /etc/nginx/conf.d can have one or more 'server { }' blocks
    include /etc/nginx/conf.d/*.conf;
}