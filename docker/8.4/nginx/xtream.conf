server {
    listen ${XTREAM_PORT};
    server_name _;

    # ========= ALLOWED ENDPOINTS =========
    # Xtream API only - strict playlist/EPG endpoints

    location = /player_api.php {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    location = /xmltv.php {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    location /get.php {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # Logo proxy - supports /logo-proxy/{encodedUrl} and /logo-proxy/{encodedUrl}/{filename}
    location ~ "^/logo-proxy/[A-Za-z0-9_\-=]+(/[A-Za-z0-9_.%!~*'()\-]+)?$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # Logo repository
    location ~ "^/logo-repository" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # Placeholder images (static files served by Laravel)
    location = /placeholder.png {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    location = /episode-placeholder.png {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    location = /vod-series-poster-placeholder.png {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= SHORT URL ROUTES =========

    # /s/{key} and /s/{key}/{path} - short URL redirects (used for M3U, EPG, HDHR short URLs)
    location ~ "^/s/[A-Za-z0-9\-]+" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= EPG ROUTES =========

    # /{uuid}/epg.xml and /{uuid}/epg.xml.gz
    location ~ "^/[^/]+/epg\.(xml|xml\.gz)$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /epgs/{uuid}/epg.xml
    location ~ "^/epgs/[^/]+/epg\.xml$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /network/{id}/epg.xml and /network/{id}/epg.xml.gz
    location ~ "^/network/[^/]+/epg\.(xml|xml\.gz)$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /networks/{user}/epg.xml
    location ~ "^/networks/[^/]+/epg\.xml$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /media-integration/{id}/networks/epg.xml
    location ~ "^/media-integration/[^/]+/networks/epg\.xml$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= PLAYLIST ROUTES =========

    # /{uuid}/playlist.m3u
    location ~ "^/[^/]+/[A-Za-z0-9_-]+\.(m3u8?|m3u)$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /{uuid}/hdhr routes (device.xml, discover.json, lineup.json, lineup_status.json, overview)
    location ~ "^/[^/]+/hdhr" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /network/{id}/playlist.m3u
    location ~ "^/network/[^/]+/playlist\.m3u$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /networks/{user}/playlist.m3u
    location ~ "^/networks/[^/]+/playlist\.m3u$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /media-integration/{id}/networks/playlist.m3u
    location ~ "^/media-integration/[^/]+/networks/playlist\.m3u$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= NETWORK STREAM ROUTES =========

    # /network/{id}/stream.{container}
    location ~ "^/network/[^/]+/stream\.(ts|mp4|mkv|avi|webm|mov)$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /network/{id}/now-playing
    location ~ "^/network/[^/]+/now-playing$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /network/{id}/live.m3u8 and /network/{id}/liveN.ts (HLS broadcast)
    location ~ "^/network/[^/]+/(live\.m3u8|live[0-9]+\.ts)$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= XTREAM STREAM ROUTES =========

    ### LIVE STREAMS / MOVIES / SERIES - ANY EXTENSION ###
    # /live/USER/PASS/<filename>.<any_extension>
    # /movie/USER/PASS/<filename>.<any_extension>
    # /series/USER/PASS/<filename>.<any_extension>
    location ~ "^/(live|movie|series)/[^/]+/[^/]+/[A-Za-z0-9_.\-]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    ### TIMESHIFT STREAMS ###
    # /timeshift/USER/PASS/DURATION/DATE/<filename>.<any_extension>
    location ~ "^/timeshift/[^/]+/[^/]+/[^/]+/[^/]+/[A-Za-z0-9_.\-]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= MEDIA SERVER / PROXY ROUTES =========

    ### SCHEDULES DIRECT IMAGE PROXY ###
    # /schedules-direct/<epg>/image/<imageHash>
    location ~ "^/schedules-direct/[A-Za-z0-9_-]+/image/[A-Za-z0-9_-]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /media-server/{id}/image/{itemId}/{imageType?}
    location ~ "^/media-server/[^/]+/image/[^/]+(/[^/]+)?$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /media-server/{id}/stream/{itemId}.{container}
    location ~ "^/media-server/[^/]+/stream/[^/]+\.[a-z0-9]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /local-media/{integration}/stream/{item}
    location ~ "^/local-media/[^/]+/stream/[^/]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /webdav-media/{integration}/stream/{item}
    location ~ "^/webdav-media/[^/]+/stream/[^/]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # /shared/stream redirect routes
    location ~ "^/shared/stream/" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    ### M3U-PROXY DEFAULT MPEG-TS STREAMS ###
    # /m3u-proxy/stream/<hash>
    location ~ "^/m3u-proxy/stream/[A-Za-z0-9 -]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    ### M3U-PROXY DEFAULT HLS STREAMS ###
    # /m3u-proxy/hls/<hash>/playlist.m3u8
    # /m3u-proxy/hls/<hash>/segment
    location ~ "^/m3u-proxy/hls/[A-Za-z0-9 -]+/[playlist\.m3u8|segment]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= XTREAM AUTH ROUTES (must come after specific routes) =========

    # /USER/PASS/<name> (Xtream auth - supports any username/password)
    location ~ "^/[^/]+/[^/]+/[A-Za-z0-9_\-]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    ### DIRECT STREAM ACCESS (without /live/ or /movie/ prefix) ###
    # /{user}/{pass}/{streamId}.{ext}
    location ~ "^/[^/]+/[^/]+/[A-Za-z0-9_.\-]+$" {
      proxy_pass http://127.0.0.1:${APP_PORT};
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Xtream-Request true;
    }

    # ========= BLOCK EVERYTHING ELSE =========

    location / {
      return 404;
    }
}
